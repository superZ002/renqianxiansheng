<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>人前显圣 · 文化急救</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js" async></script>
</head>
<body>
    <div class="paper-texture" aria-hidden="true"></div>
    <div class="ink-wash" aria-hidden="true"></div>

    <div class="scroll-container">
        <div class="scroll-top" aria-hidden="true"></div>

        <main class="scroll-body">
            <!-- 头部印章标题 -->
            <header class="app-header">
                <div class="header-top">
                    <div class="seal-wrap">
                        <div class="seal">显圣</div>
                    </div>
                    <button class="settings-btn" id="settingsBtn" aria-label="设置">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                </div>
                <h1 class="app-title">人前显圣</h1>
                <p class="app-subtitle">—— 文化急救 · 一句封神 ——</p>
            </header>

            <!-- 输入区域 -->
            <section class="input-section">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="image">
                        <span class="tab-char">画</span>
                        <span class="tab-label">图片上传</span>
                    </button>
                    <button class="tab-btn" data-tab="text">
                        <span class="tab-char">文</span>
                        <span class="tab-label">文字描述</span>
                    </button>
                </div>

                <div class="tab-content active" id="tab-image">
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <div class="upload-placeholder" id="uploadPlaceholder">
                            <div class="upload-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                            </div>
                            <p class="upload-text">上传你的「名场面」</p>
                            <p class="upload-hint">JPG / PNG · 帮你配一句绝妙文案</p>
                        </div>
                        <div class="preview-wrap" id="previewWrap" hidden>
                            <img id="previewImage" class="preview-image" alt="预览图片">
                            <button class="remove-btn" id="removeBtn" title="移除图片">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"/>
                                    <line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="tab-text">
                    <div class="text-input-wrap">
                        <textarea id="textInput" class="text-input" placeholder="用笔描述你眼前的光景...

例如：凌晨四点不眠的城市、登顶后俯瞰群山" rows="4"></textarea>
                        <div class="input-footer">
                            <span class="char-count" id="charCount">0 / 200</span>
                        </div>
                    </div>
                </div>

                <!-- 地区选择 -->
                <div class="region-selector">
                    <span class="region-label">地方韵味</span>
                    <div class="region-tags" id="regionTags">
                        <button class="region-tag active" data-region="北方">通用</button>
                        <button class="region-tag" data-region="东北">东北</button>
                        <button class="region-tag" data-region="四川">四川</button>
                        <button class="region-tag" data-region="粤语">粤语</button>
                        <button class="region-tag" data-region="河南">河南</button>
                        <button class="region-tag" data-region="上海">上海</button>
                    </div>
                </div>

                <button class="generate-btn" id="generateBtn">
                    <span class="btn-inner">
                        <span class="btn-icon">✦</span>
                        <span class="btn-text">一 键 显 圣</span>
                        <span class="btn-icon">✦</span>
                    </span>
                </button>
            </section>

            <!-- 加载状态 -->
            <section class="loading-section" id="loadingSection" hidden>
                <div class="loading-ink">
                    <div class="ink-circle c1"></div>
                    <div class="ink-circle c2"></div>
                    <div class="ink-circle c3"></div>
                </div>
                <p class="loading-text" id="loadingText">凝思中...</p>
            </section>

            <!-- 结果展示 -->
            <section class="result-section" id="resultSection" hidden>
                <div class="result-header">
                    <span class="result-divider"></span>
                    <span class="result-title">神 来 之 笔</span>
                    <span class="result-divider"></span>
                </div>

                <!-- 识别标签 -->
                <div class="recognition-card">
                    <div class="recog-label">神识解析</div>
                    <div class="recog-tags">
                        <span class="recog-tag" id="tagObject">—</span>
                        <span class="recog-dot">·</span>
                        <span class="recog-tag" id="tagEmotion">—</span>
                        <span class="recog-dot">·</span>
                        <span class="recog-tag" id="tagOccasion">—</span>
                    </div>
                </div>

                <!-- 三风格卡片 -->
                <div class="result-cards">
                    <article class="quote-card style-classic">
                        <div class="card-top">
                            <span class="style-seal">古</span>
                            <span class="style-name">古风</span>
                            <button class="copy-btn" data-copy="classic" aria-label="复制">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                </svg>
                            </button>
                        </div>
                        <blockquote class="quote-text" id="resultClassic">
                            ——
                        </blockquote>
                    </article>

                    <article class="quote-card style-modern">
                        <div class="card-top">
                            <span class="style-seal">今</span>
                            <span class="style-name">现代文学</span>
                            <button class="copy-btn" data-copy="modern" aria-label="复制">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                </svg>
                            </button>
                        </div>
                        <blockquote class="quote-text" id="resultModern">
                            ——
                        </blockquote>
                    </article>

                    <article class="quote-card style-humor">
                        <div class="card-top">
                            <span class="style-seal">趣</span>
                            <span class="style-name">幽默吐槽</span>
                            <button class="copy-btn" data-copy="humor" aria-label="复制">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                </svg>
                            </button>
                        </div>
                        <blockquote class="quote-text" id="resultHumor">
                            ——
                        </blockquote>
                    </article>

                    <article class="quote-card style-difang">
                        <div class="card-top">
                            <span class="style-seal">乡</span>
                            <span class="style-name">地方韵味</span>
                            <button class="copy-btn" data-copy="difang" aria-label="复制">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                                </svg>
                            </button>
                        </div>
                        <blockquote class="quote-text" id="resultDifang">
                            ——
                        </blockquote>
                    </article>
                </div>

                <!-- 操作栏 -->
                <div class="action-bar">
                    <button class="btn-outline" id="retryBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                        </svg>
                        再来一次
                    </button>
                    <button class="btn-primary" id="shareBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"/>
                            <circle cx="6" cy="12" r="3"/>
                            <circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>
                        一键分享
                    </button>
                </div>
            </section>

            <!-- 设置弹窗 -->
            <div class="settings-modal" id="settingsModal" hidden>
                <div class="modal-overlay" id="modalOverlay"></div>
                <div class="modal-content">
                    <div class="modal-header">
                        <span class="modal-title">显圣设置</span>
                        <button class="modal-close" id="modalClose" aria-label="关闭">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="form-group">
                            <label class="form-label">选择模型</label>
                            <div class="model-selector">
                                <button class="model-option active" data-model="doubao">
                                    <span class="model-icon">🎭</span>
                                    <div class="model-info">
                                        <span class="model-name">Doubao-Seed-1.8</span>
                                        <span class="model-desc">字节跳动 · 豆包多模态</span>
                                    </div>
                                </button>
                                <button class="model-option" data-model="glm">
                                    <span class="model-icon">💎</span>
                                    <div class="model-info">
                                        <span class="model-name">GLM-5V-Turbo</span>
                                        <span class="model-desc">智谱AI · 视觉语言模型</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="apiKeyInput">API Key</label>
                            <input type="password" id="apiKeyInput" class="form-input" placeholder="请输入你的 API Key">
                            <p class="form-hint">Key 仅保存在本地浏览器，不会上传到任何服务器</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="modelIdInput">接入点 ID</label>
                            <input type="text" id="modelIdInput" class="form-input" placeholder="ep-xxxxxxxx">
                            <p class="form-hint">火山引擎方舟平台的接入点 ID</p>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="apiEndpointInput">API 地址（可选）</label>
                            <input type="text" id="apiEndpointInput" class="form-input" placeholder="留空使用默认地址">
                        </div>
                        <div class="form-group">
                            <label class="form-label">生成风格</label>
                            <div class="style-toggles">
                                <label class="toggle-item">
                                    <input type="checkbox" id="styleClassic" checked>
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">古风</span>
                                </label>
                                <label class="toggle-item">
                                    <input type="checkbox" id="styleModern" checked>
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">现代文学</span>
                                </label>
                                <label class="toggle-item">
                                    <input type="checkbox" id="styleHumor" checked>
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">幽默吐槽</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn-outline" id="resetSettingsBtn">恢复默认</button>
                        <button class="btn-primary" id="saveSettingsBtn">保存设置</button>
                    </div>
                </div>
            </div>

            <!-- 底部印章落款 -->
            <footer class="app-footer">
                <div class="footer-seal">印</div>
                <p>—— 用文化，惊艳所有人 ——</p>
            </footer>
        </main>

        <div class="scroll-bottom" aria-hidden="true"></div>
    </div>

    <div class="copy-toast" id="copyToast">
        <span class="toast-seal">✓</span>
        <span class="toast-text">已复制 · 速去发圈</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
